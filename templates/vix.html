<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Alerta VIX</title>
</head>

<body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,Helvetica,sans-serif;">

    <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:40px 0;">
        <tr>
            <td align="center">

                <table width="600" cellpadding="0" cellspacing="0"
                    style="background:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e5e7eb;">

                    <!-- Header -->
                    <tr>
                        <td align="center"
                            style="background:#1f2937;color:#ffffff;padding:25px;font-size:28px;font-weight:bold;">
                            📈 Alerta del VIX
                        </td>
                    </tr>

                    <!-- Intro -->
                    <tr>
                        <td style="padding:30px;font-size:16px;color:#4b5563;line-height:1.6;">
                            Se detectó una actualización en el índice de volatilidad
                            <strong>VIX</strong>.
                        </td>
                    </tr>

                    <!-- Tabla -->
                    <tr>
                        <td style="padding:0 30px 30px;">

                            <table width="100%" cellpadding="12" cellspacing="0"
                                style="border-collapse:collapse;border:1px solid #e5e7eb;">

                                <tr style="background:#111827;color:#ffffff;">
                                    <th align="left">Concepto</th>
                                    <th align="right">Valor</th>
                                </tr>

                                <tr style="background:#f9fafb;">
                                    <td><strong>VIX previo</strong></td>
                                    <td align="right"
                                        style="font-size:22px;font-weight:bold;color:#2563eb;">
                                        {{previous}}
                                    </td>
                                </tr>

                                <tr>
                                    <td><strong>VIX actual</strong></td>
                                    <td align="right"
                                        style="font-size:22px;font-weight:bold;color:#dc2626;">
                                        {{current}}
                                    </td>
                                </tr>

                            </table>

                        </td>
                    </tr>

                    <!-- Nota -->
                    <tr>
                        <td style="padding:0 30px 30px;color:#6b7280;font-size:14px;line-height:1.5;">
                            Este correo fue generado automáticamente por el sistema de monitoreo del VIX.
                        </td>
                    </tr>

                    <!-- Footer -->
                    <tr>
                        <td align="center"
                            style="background:#f3f4f6;padding:20px;color:#9ca3af;font-size:12px;">
                            © 2026 • Sistema de Alertas Financieras
                        </td>
                    </tr>

                </table>

            </td>
        </tr>
    </table>

</body>

</html>
